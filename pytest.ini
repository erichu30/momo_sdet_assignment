[pytest]
addopts = --html=pytest_html_report.html --self-contained-html -v -s
testpaths = suites
# Put the project root on sys.path so tests import modules (run_tests, utils, pages)
# regardless of how pytest is invoked (pytest / uv run pytest / python -m pytest).
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
log_cli = true
log_cli_level = INFO
log_cli_format = [%(asctime)s] [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

markers =
    rat: Release Acceptance Testing (smoke test, verify core search works)
    fast: Core User Experience Happy Path Testing
    toft: Testing Of Functionality and Toleration
    fet: Functional Edge Testing
    test_id: Unique Test Case Identifier (e.g. SEARCH-001)
