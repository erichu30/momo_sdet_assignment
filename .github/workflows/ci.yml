name: CI

# Runs the fast, deterministic framework self-tests on every pull request (so it can
# be a required status check on the master release PR) and on pushes to dev / master.
# The live SEARCH E2E is intentionally excluded — it hits a third-party rate-limiting
# site and would be flaky in CI.
on:
  pull_request:
  push:
    branches: [dev, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  self-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Framework self-tests
        run: uv run pytest test/ -q
